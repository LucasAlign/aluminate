# Firebase SQL Connect operations for the Aluminate alumni platform.

mutation createUser(
  $email: String!
  $name: String!
  $graduationYear: Int
  $major: String
) {
  user_insert(
    data: {
      email: $email
      name: $name
      graduationYear: $graduationYear
      major: $major
    }
  )
}

query getAlumniByYear($graduationYear: Int!) {
  users(where: { graduationYear: { eq: $graduationYear } }) {
    id
    email
    name
    graduationYear
    major
  }
}

mutation createPost(
  $content: String!
  $authorId: UUID!
) {
  post_insert(
    data: {
      content: $content
      author: { id: $authorId }
    }
  )
}
