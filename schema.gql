# Firebase SQL Connect schema for the Aluminate alumni platform.

enum ConnectionStatus {
  PENDING
  ACCEPTED
  DECLINED
  BLOCKED
}

type User @table(name: "users", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  email: String! @unique @col(dataType: "varchar(255)")
  name: String! @col(dataType: "varchar(120)")
  graduationYear: Int
  major: String @col(dataType: "varchar(120)")
}

type Post @table(name: "posts", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  content: String! @col(dataType: "text")
  createdAt: Timestamp! @default(expr: "request.time")

  author: User! @ref(fields: "authorId", references: "id")
}

type Connection @table(name: "connections", key: "id") {
  id: UUID! @default(expr: "uuidV4()")

  requester: User! @ref(fields: "requesterId", references: "id")
  receiver: User! @ref(fields: "receiverId", references: "id")

  status: ConnectionStatus! @default(value: PENDING)
}
